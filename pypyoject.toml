[build-system]
requires = ["setuptools>=75.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "noshow-iq-59613"
version = "0.1.0"
description = "NoShowIQ predicts patient appointment no-show risk using an MLOps-ready API."
readme = "README.md"
requires-python = ">=3.11"
authors = [
    {name = "Wasif Ali Pervez", email = "wasifalipervez1993@gmail.com"}
]
license = {text = "MIT"}
dependencies = [
    "fastapi==0.115.6",
    "uvicorn[standard]==0.34.0",
    "pandas==2.2.3",
    "numpy==2.2.1",
    "scikit-learn==1.6.0",
    "joblib==1.4.2",
    "pymongo==4.10.1",
    "python-dotenv==1.0.1",
    "pydantic==2.10.4",
    "imbalanced-learn==0.13.0"
]

[project.optional-dependencies]
dev = [
    "pytest==8.3.4",
    "httpx==0.28.1",
    "flake8==7.1.1",
    "build",
    "twine"
]

[tool.setuptools.packages.find]
include = ["noshow_iq*"]